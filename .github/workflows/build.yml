# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/tutorials/build-and-test-code/python

name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main 
      - feature/**

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Maximize build space
        shell: bash
        run: | 
          df -h
          if [ "$RUNNER_OS" != "Windows" ]; then
            sudo rm -rf /usr/share/dotnet & 
            sudo rm -rf /usr/local/lib/android &
            sudo rm -rf /opt/ghc & 
            sudo rm -rf /usr/local/share/boost
          fi
          df -h
      - name: Install dependencies
        run: |
          pip install tox
      - name: Check build space
        shell: bash
        run: | 
          df -h
      - name: Run unit tests
        run: |
          tox -e unit-tests
      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        if: ${{ strategy.job-index == 0 }}

  pennylane-device-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Maximize build space
        shell: bash
        run: |
          df -h
          if [ "$RUNNER_OS" != "Windows" ]; then
            sudo rm -rf /usr/share/dotnet & 
            sudo rm -rf /usr/local/lib/android &
            sudo rm -rf /opt/ghc & 
            sudo rm -rf /usr/local/share/boost
          fi
          df -h
      - name: Install dependencies
        run: |
          pip install tox
      - name: Check build space
        shell: bash
        run: |
          df -h
      - name: Run PennyLane device integration tests
        run: |
          tox -e pennylane-device-tests
